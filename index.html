<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Download Center</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f6f8fa;
            color: #24292f;
        }
        h1 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 10px;
            font-size: 24px;
        }
        .file-list {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 0;
            list-style: none;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #d0d7de;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-info {
            display: flex;
            align-items: center;
        }
        .file-name {
            color: #24292f;
            text-decoration: none;
            font-weight: 500;
        }
        .file-name:hover {
            color: #0969da;
            text-decoration: underline;
        }
        .icon {
            margin-right: 10px;
            font-size: 18px;
        }
        .download-btn {
            background-color: #2da44e;
            color: white;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .download-btn:hover {
            background-color: #2c974b;
        }
        .download-btn .btn-icon {
            margin-right: 4px;
        }
        .error {
            color: #cf222e;
            background-color: #ffebe9;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid rgba(255,129,130,0.4);
        }
    </style>
</head>
<body>

    <h1 id="repo-title">Downloads</h1>
    <ul id="files" class="file-list">
        <li class="file-item">Detecting repository and loading files...</li>
    </ul>

    <script>
        // Automatically extract username and repo from the GitHub Pages URL
        // Example URL: https://username.github.io/repo-name/
        function getRepoDetailsFromUrl() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;

            // Handle standard github.io domains
            if (hostname.endsWith('.github.io')) {
                const username = hostname.split('.')[0];
                // Split path and grab the first segment as the repo name
                const repo = pathname.split('/').filter(Boolean)[0]; 
                return { username, repo };
            }
            
            // Fallback: If you are previewing the file locally (e.g., file:// or localhost)
            // You can replace these default values for local testing purposes
            return {
                username: null,
                repo: null
            };
        }

        async function fetchRepoFiles() {
            const fileListElement = document.getElementById('files');
            const { username, repo } = getRepoDetailsFromUrl();

            // Error check for local testing vs live server
            if (!username || !repo) {
                fileListElement.innerHTML = `
                    <li class="error">
                        <strong>Cannot auto-detect repository:</strong> 
                        This script relies on the live GitHub Pages URL (e.g., <code>https://username.github.io/repo/</code>) to find your files. 
                        It won't display files while opened locally in your browser. Push it to GitHub to see it work!
                    </li>
                `;
                return;
            }

            document.getElementById('repo-title').innerText = `${repo} Downloads`;
            const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/`;

            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch repository files from API.`);
                }

                const items = await response.json();
                fileListElement.innerHTML = '';

                // Filter out index.html and hidden files
                const filteredItems = items.filter(item => item.name !== 'index.html' && !item.name.startsWith('.'));

                if (filteredItems.length === 0) {
                    fileListElement.innerHTML = '<li class="file-item">No files available for download.</li>';
                    return;
                }

                // Sort: Folders first, then files
                filteredItems.sort((a, b) => (b.type === 'dir') - (a.type === 'dir'));

                filteredItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    
                    const isFolder = item.type === 'dir';
                    const icon = isFolder ? '📁' : '📄';
                    const fileLink = `./${item.path}`; 

                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'file-info';
                    infoDiv.innerHTML = `
                        <span class="icon">${icon}</span>
                        <a class="file-name" href="${fileLink}" ${!isFolder ? 'download' : ''}>${item.name}</a>
                    `;
                    li.appendChild(infoDiv);

                    if (!isFolder) {
                        const downloadBtn = document.createElement('a');
                        downloadBtn.className = 'download-btn';
                        downloadBtn.href = fileLink;
                        downloadBtn.setAttribute('download', item.name); 
                        downloadBtn.innerHTML = '<span class="btn-icon">⬇</span> Download';
                        li.appendChild(downloadBtn);
                    }

                    fileListElement.appendChild(li);
                });

            } catch (error) {
                fileListElement.innerHTML = `
                    <li class="error">
                        <strong>Error loading files:</strong> ${error.message}
                    </li>
                `;
            }
        }

        // Run the script
        fetchRepoFiles();
    </script>
</body>
</html>
